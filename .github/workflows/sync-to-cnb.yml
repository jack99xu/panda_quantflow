name: 同步到 cnb.cool

on:
  push:
    branches: [main]
  # 也可以手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 推送到 cnb.cool
        run: |
          git remote add cnb https://jack99xu:${{ secrets.CNB_TOKEN }}@cnb.cool/jack99xu/panda_quantflow.git
          git push -f cnb main
